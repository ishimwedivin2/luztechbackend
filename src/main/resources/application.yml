spring:
  application:
    name: "Luz Technology System"

  datasource:
    url: ${env.DB_URL}
    username: ${env.DB_USERNAME}
    password: ${env.DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${env.MAIL_USERNAME}
    password: ${env.MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 15000
          starttls:
            enable: true
          timeout: 15000
          writetimeout: 15000

jwt:
  secret: ${env.JWT_SECRET}
  expirationMs: 86400000 # 24 hours
  refreshExpirationMs: 2592000000 # 30 days

app:
  tax:
    sales-rate: 0.18
  password-reset:
    expiration-minutes: 30
    url: ${env.PASSWORD_RESET_URL:http://localhost:5173}
  mfa:
    expiration-minutes: 10

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

payment:
  mode: real
  stripe:
    secret-key: ${env.STRIPE_SECRET_KEY}
    webhook-secret: ${env.STRIPE_WEBHOOK_SECRET}
    currency: usd
  mtn:
    collection-subscription-key: ${env.MTN_COLLECTION_SUBSCRIPTION_KEY}
    disbursement-subscription-key: ${env.MTN_DISBURSEMENT_SUBSCRIPTION_KEY}
    api-user: ${env.MTN_API_USER:}
    api-key: ${env.MTN_API_KEY:}
    target-environment: ${env.MTN_TARGET_ENVIRONMENT:sandbox}
    base-url: ${env.MTN_BASE_URL:https://sandbox.momodeveloper.mtn.com}
    callback-host: ${env.MTN_CALLBACK_HOST:localhost}

file:
  upload-dir: "uploads"

system:
  backup-dir: "backups"
  pg-dump-command: "C:/Program Files/PostgreSQL/17/bin/pg_dump"
  psql-command: "C:/Program Files/PostgreSQL/17/bin/psql"
