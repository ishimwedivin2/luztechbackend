spring:
  application:
    name: "Luz Technology System"

  config:
    import: optional:file:./local.properties

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 15000
          starttls:
            enable: true
          timeout: 15000
          writetimeout: 15000

jwt:
  secret: ${JWT_SECRET}
  expirationMs: 86400000 # 24 hours
  refreshExpirationMs: 2592000000 # 30 days

app:
  tax:
    sales-rate: 0.18
  password-reset:
    expiration-minutes: 30
    url: ${PASSWORD_RESET_URL:http://localhost:5173}
  mfa:
    expiration-minutes: 10

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

payment:
  mode: real
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    currency: usd
  mtn:
    collection-subscription-key: ${MTN_COLLECTION_SUBSCRIPTION_KEY}
    disbursement-subscription-key: ${MTN_DISBURSEMENT_SUBSCRIPTION_KEY}
    api-user: ${MTN_API_USER:}
    api-key: ${MTN_API_KEY:}
    target-environment: ${MTN_TARGET_ENVIRONMENT:sandbox}
    base-url: ${MTN_BASE_URL:https://sandbox.momodeveloper.mtn.com}
    callback-host: ${MTN_CALLBACK_HOST:localhost}

file:
  upload-dir: "uploads"

system:
  backup-dir: "backups"
  pg-dump-command: "C:/Program Files/PostgreSQL/17/bin/pg_dump"
  psql-command: "C:/Program Files/PostgreSQL/17/bin/psql"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

info:
  app:
    name: "Luz Technology System"
    version: "1.0.0"
    description: "Integrated Management Information and E-Commerce System"
