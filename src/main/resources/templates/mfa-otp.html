<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Verification Code — Luz Technology</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f1f5f9; color: #1e293b; }
    .wrap { max-width: 520px; margin: 32px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #ffffff; padding: 28px 32px; text-align: center; border-bottom: 1px solid #e2e8f0; }
    .brand-logo { width: 72px; height: 72px; object-fit: contain; border-radius: 10px; background: #ffffff; padding: 6px; margin: 0 auto 14px; display: block; }
    .header h1 { color: #0f172a; font-size: 20px; font-weight: 800; }
    .header p { color: #64748b; font-size: 13px; margin-top: 4px; }
    .body { padding: 32px; text-align: center; }
    .icon-wrap { width: 56px; height: 56px; background: #eff6ff; border-radius: 50%; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    h2 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #475569; line-height: 1.6; margin-bottom: 24px; }
    .code-box { display: inline-block; min-width: 220px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px 24px; font-size: 34px; line-height: 1; font-weight: 800; letter-spacing: 8px; color: #0f172a; margin-bottom: 18px; }
    .expiry { font-size: 12px; color: #64748b; margin-bottom: 24px; }
    .expiry strong { color: #0f172a; }
    .ignore { font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .footer { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px 32px; text-align: center; }
    .footer p { font-size: 12px; color: #94a3b8; line-height: 1.7; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="cid:logo" alt="Luz Technology" class="brand-logo">
    <h1>Luz Technology</h1>
    <p>Login verification</p>
  </div>

  <div class="body">
    <div class="icon-wrap">🔐</div>
    <h2>Login verification code</h2>
    <p class="sub">
      Hi <strong th:text="${name}">User</strong>, use this code to finish signing in to your
      Luz Technology account.
    </p>
    <div class="code-box" th:text="${code}">000000</div>
    <p class="expiry">
      This code expires in <strong><span th:text="${expirationMinutes}">10</span> minutes</strong>.
    </p>
    <p class="ignore">If you did not try to log in, you can safely ignore this email.</p>
  </div>

  <div class="footer">
    <p>&copy; 2025 Luz Technology. All rights reserved.</p>
  </div>
</div>
</body>
</html>
